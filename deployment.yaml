apiVersion: apps/v1
kind: Deployment
metadata: 
   name: sre-app
spec:
   replicas: 2
   selector:
     matchLabels:
       app: sre-app
   template:
     metadata:
       labels:
         app: sre-app
     spec:
       containers:
       - name: sre-app
         image: sre-app:latest
         imagePullPolicy: Never
         ports:
         - containerPort: 5000

